<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detector</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
            overflow-x:hidden;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            width:500px;
            height:500px;
            background:#14b8a6;
            border-radius:50%;
            filter:blur(180px);
            top:-150px;
            left:-150px;
            opacity:0.4;
            animation:float1 8s infinite alternate;
        }

        body::after{
            content:'';
            position:absolute;
            width:450px;
            height:450px;
            background:#3b82f6;
            border-radius:50%;
            filter:blur(180px);
            bottom:-150px;
            right:-150px;
            opacity:0.4;
            animation:float2 8s infinite alternate;
        }

        @keyframes float1{
            from{transform:translateY(0);}
            to{transform:translateY(60px);}
        }

        @keyframes float2{
            from{transform:translateY(0);}
            to{transform:translateY(-60px);}
        }

        .container{
            width:90%;
            max-width:600px;
            padding:40px;
            text-align:center;
            border-radius:30px;
            backdrop-filter:blur(20px);
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.25),
                inset 0 1px 1px rgba(255,255,255,0.15);
            color:white;
            position:relative;
            z-index:10;
        }

        h2{
            font-size:2.3rem;
            margin-bottom:10px;
            font-weight:700;
        }

        .subtitle{
            color:#d1d5db;
            margin-bottom:30px;
            font-size:1rem;
        }

        .file-input-wrapper{
            margin-bottom:20px;
        }

        input[type="file"]{
            width:100%;
            padding:14px;
            border-radius:15px;
            border:2px dashed rgba(255,255,255,0.3);
            background:rgba(255,255,255,0.05);
            color:white;
            cursor:pointer;
        }

        input[type="file"]::-webkit-file-upload-button{
            background:#14b8a6;
            border:none;
            padding:10px 18px;
            border-radius:10px;
            color:white;
            font-weight:600;
            cursor:pointer;
            margin-right:10px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:15px;
            background:linear-gradient(135deg,#14b8a6,#3b82f6);
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(20,184,166,0.4);
        }

        .result-card{
            margin-top:30px;
            padding:25px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            animation:fadeIn 0.6s ease;
        }

        .result-card hr{
            border:none;
            height:1px;
            background:rgba(255,255,255,0.15);
            margin-bottom:20px;
        }

        .result-card p{
            color:#d1d5db;
            margin-bottom:10px;
        }

        .emotion-text{
            font-size:2rem;
            font-weight:700;
            margin-bottom:20px;
            background:linear-gradient(
                90deg,
                #14b8a6,
                #3b82f6,
                #a855f7
            );
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .image-preview{
            margin:20px 0;
        }

        .image-preview img{
            width:100%;
            max-height:350px;
            object-fit:cover;
            border-radius:20px;
            border:2px solid rgba(255,255,255,0.15);
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .reset-btn{
            display:inline-block;
            text-decoration:none;
            margin-top:15px;
            padding:12px 24px;
            border-radius:12px;
            background:rgba(255,255,255,0.12);
            color:white;
            transition:0.3s;
        }

        .reset-btn:hover{
            background:#14b8a6;
            transform:translateY(-2px);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:600px){
            .container{
                padding:25px;
            }

            h2{
                font-size:1.8rem;
            }

            .emotion-text{
                font-size:1.6rem;
            }
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>🤖 AI Emotion Detector</h2>
        <p class="subtitle">Upload a face image and let AI detect the emotion</p>

        <form method="POST" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <input type="file" name="image" id="file" accept="image/*" required>
            </div>

            <button type="submit">
                Analyze Emotion
            </button>
        </form>

        {% if prediction %}
        <div class="result-card">
            <hr>

            <p>Analysis Result</p>

            <h3 class="emotion-text">
                {{ prediction }}
            </h3>

            <div class="image-preview">
                <img src="{{ image_path }}" alt="Uploaded Image">
            </div>

            <a href="/" class="reset-btn">
                Try Another Image
            </a>
        </div>
        {% endif %}
    </div>

</body>
</html>
